<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>I Love You Robsi ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* === Full Screen Photo with Animation === */
        .photo-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            animation: zoomPan 20s ease-in-out infinite alternate;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes zoomPan {
            0% {
                transform: scale(1) translate(0, 0);
            }
            25% {
                transform: scale(1.1) translate(-2%, -2%);
            }
            50% {
                transform: scale(1.15) translate(0%, 2%);
            }
            75% {
                transform: scale(1.08) translate(3%, -1%);
            }
            100% {
                transform: scale(1) translate(0, 0);
            }
        }

        /* === Gradient Overlay with Animation === */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(255, 51, 102, 0.3), 
                rgba(0, 0, 0, 0.5), 
                rgba(255, 51, 102, 0.2));
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* === Falling Hearts Shower === */
        .hearts-shower {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .falling-heart {
            position: absolute;
            top: -60px;
            font-size: 24px;
            opacity: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        /* === Content Layer === */
        .content {
            position: relative;
            z-index: 4;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* === Main Big Heart === */
        .big-heart {
            position: relative;
            width: 130px;
            height: 120px;
            margin-bottom: 15px;
            animation: heartbeat 1.2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 51, 102, 0.8));
        }

        .big-heart::before,
        .big-heart::after {
            position: absolute;
            content: '';
            left: 65px;
            top: 0;
            width: 65px;
            height: 105px;
            background: #ff3366;
            border-radius: 65px 65px 0 0;
            transform-origin: bottom center;
        }

        .big-heart::before {
            transform: rotate(-45deg);
            left: 0;
        }

        .big-heart::after {
            transform: rotate(45deg);
            left: 65px;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            56% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* === Glowing Text === */
        h1 {
            color: #fff;
            font-size: 58px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff3366, 0 0 40px #ff3366, 0 0 80px #ff3366;
            animation: glowText 2s ease-in-out infinite alternate;
            margin-bottom: 5px;
        }

        @keyframes glowText {
            0% { text-shadow: 0 0 20px #ff3366, 0 0 40px #ff3366; }
            100% { text-shadow: 0 0 30px #ff6699, 0 0 60px #ff6699, 0 0 100px #ff3366; }
        }

        h2 {
            color: #ff99bb;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.6);
            animation: bounceText 2s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes bounceText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* === Sparkle Text === */
        .sparkle-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            letter-spacing: 3px;
            animation: sparkle 1.5s ease-in-out infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes sparkle {
            0% { opacity: 0.5; text-shadow: 0 0 5px #fff; }
            100% { opacity: 1; text-shadow: 0 0 20px #ff6699, 0 0 40px #ff3366; }
        }

        /* === Music Player === */
        .music-player {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: borderGlow 3s ease-in-out infinite alternate;
            margin-bottom: 15px;
        }

        @keyframes borderGlow {
            0% { border-color: rgba(255, 51, 102, 0.3); box-shadow: 0 0 15px rgba(255, 51, 102, 0.2); }
            100% { border-color: rgba(255, 102, 153, 0.6); box-shadow: 0 0 30px rgba(255, 51, 102, 0.5); }
        }

        .music-player audio {
            width: 300px;
            height: 40px;
            outline: none;
        }

        .music-player audio::-webkit-media-controls-panel {
            background: rgba(30, 30, 30, 0.8);
        }

        /* === Rotating Ring === */
        .ring-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 15px;
            animation: spinRing 10s linear infinite;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #ff3366;
            border-bottom: 3px solid #ff6699;
            animation: spinRing 4s linear infinite;
        }

        .ring:nth-child(2) {
            width: 150px;
            height: 150px;
            border-top: 3px solid #ff6699;
            border-bottom: 3px solid #ff3366;
            border-left: 3px solid transparent;
            border-right: 3px solid transparent;
            animation-direction: reverse;
            animation-duration: 3s;
        }

        .ring:nth-child(3) {
            width: 120px;
            height: 120px;
            border-top: 3px solid #ff99cc;
            border-bottom: 3px solid #ff3366;
            animation-duration: 2.5s;
        }

        @keyframes spinRing {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* === Bottom Quote === */
        .quote {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-style: italic;
            animation: fadeQuote 3s ease-in-out infinite alternate;
            margin-top: 10px;
        }

        @keyframes fadeQuote {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* === Shooting Stars === */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: shoot 4s linear infinite;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            70% { opacity: 1; }
            100% { transform: translateX(-200px) translateY(200px); opacity: 0; }
        }

        /* === Responsive === */
        @media (max-width: 600px) {
            h1 { font-size: 38px; }
            h2 { font-size: 24px; }
            .music-player audio { width: 220px; }
            .big-heart { width: 100px; height: 90px; }
            .big-heart::before, .big-heart::after { width: 50px; height: 80px; left: 50px; }
            .big-heart::before { left: 0; }
            .big-heart::after { left: 50px; }
        }
    </style>
</head>
<body>

    <!-- Photo with Zoom Animation -->
    <div class="photo-container">
        <img src="robsi.jpg" alt="Robsi">
    </div>

    <!-- Gradient Overlay -->
    <div class="overlay"></div>

    <!-- Shooting Stars -->
    <div class="stars" id="stars"></div>

    <!-- Falling Hearts Shower -->
    <div class="hearts-shower" id="heartsShower"></div>

    <!-- Main Content -->
    <div class="content">
        <!-- Animated Ring -->
        <div class="ring-container">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>

        <!-- Big Animated Heart -->
        <div class="big-heart"></div>

        <!-- Text -->
        <h1>I Love You</h1>
        <h2>Robsi ❤️</h2>

        <div class="sparkle-text">✨ Forever & Always ✨</div>

        <!-- Music Player -->
        <div class="music-player">
            <audio controls autoplay loop>
                <source src="song.mp3" type="audio/mpeg">
                Your browser does not support audio.
            </audio>
        </div>

        <div class="quote">💕 "You are my sunshine, my only sunshine" 💕</div>
    </div>

    <script>
        // === Falling Hearts Shower ===
        function startHeartShower() {
            const container = document.getElementById('heartsShower');
            const heartSymbols = ['❤', '💖', '💕', '💗', '💓', '💘', '💝', '🌸'];
            
            function createHeart() {
                const heart = document.createElement('div');
                heart.className = 'falling-heart';
                heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                heart.style.animationDelay = '0s';
                container.appendChild(heart);

                setTimeout(() => heart.remove(), 10000);
            }

            // Create hearts at intervals
            setInterval(createHeart, 150);
            
            // Initial burst
            for (let i = 0; i < 30; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        // === Shooting Stars ===
        function createStars() {
            const container = document.getElementById('stars');
            
            setInterval(() => {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 50 + '%';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                star.style.animationDelay = '0s';
                star.style.width = (Math.random() * 3 + 2) + 'px';
                star.style.height = star.style.width;
                container.appendChild(star);
                
                setTimeout(() => star.remove(), 5000);
            }, 800);
        }

        // === Small Floating Hearts Around Content ===
        function createFloatingHearts() {
            const symbols = ['❤', '💕', '💗', '✨'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.style.cssText = `
                    position: fixed;
                    font-size: ${Math.random() * 15 + 10}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    pointer-events: none;
                    z-index: 5;
                    opacity: 0;
                    animation: floatUp ${Math.random() * 3 + 3}s linear forwards;
                `;
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 6000);
            }, 200);
        }

        // Add floatUp animation dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatUp {
                0% { transform: translateY(0) scale(0); opacity: 0; }
                20% { opacity: 0.8; }
                80% { opacity: 0.6; }
                100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Start all animations
        startHeartShower();
        createStars();
        createFloatingHearts();
    </script>

</body>
</html>
